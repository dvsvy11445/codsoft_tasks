<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0f0f1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { width: 420px; height: 650px; background: #1a1a2e; border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
    .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 18px 20px; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 42px; height: 42px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header h2 { color: #fff; font-size: 16px; }
    .header p { color: rgba(255,255,255,0.8); font-size: 12px; }
    .chat-area { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }
    .message { max-width: 85%; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .bot { align-self: flex-start; }
    .user { align-self: flex-end; }
    .bubble { padding: 11px 15px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
    .bot .bubble { background: #252540; color: #e2e2f0; border-bottom-left-radius: 4px; }
    .user .bubble { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-bottom-right-radius: 4px; }
    .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 12px; }
    .quick-btn { background: rgba(102,126,234,0.15); border: 1px solid rgba(102,126,234,0.4); color: #a5b4fc; padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; }
    .quick-btn:hover { background: rgba(102,126,234,0.3); color: #fff; }
    .input-area { padding: 14px 16px; background: #141428; display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
    .input-area input { flex: 1; background: #252540; border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; padding: 11px 18px; color: #e2e2f0; font-size: 14px; outline: none; }
    .input-area input::placeholder { color: #555570; }
    .send-btn { width: 42px; height: 42px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 50%; cursor: pointer; color: white; font-size: 18px; }
    .typing { display: flex; gap: 5px; padding: 11px 15px; background: #252540; border-radius: 18px; width: fit-content; }
    .typing span { width: 7px; height: 7px; background: #667eea; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar">🤖</div>
    <div><h2>AI Assistant</h2><p>🟢 Online • Rule-Based AI</p></div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="quick-replies">
    <button class="quick-btn" onclick="sendQuick('Hello!')">👋 Hello</button>
    <button class="quick-btn" onclick="sendQuick('What can you do?')">💡 Features</button>
    <button class="quick-btn" onclick="sendQuick('Tell me a joke')">😄 Joke</button>
    <button class="quick-btn" onclick="sendQuick('What is AI?')">🧠 What is AI?</button>
  </div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" />
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>
<script>
  const responses = {
    greetings: { patterns: ['hello','hi','hey','sup'], replies: ["Hello! 👋 Great to meet you! How can I help?", "Hey there! 😊 What's on your mind?"] },
    name: { patterns: ['your name','who are you','what are you'], replies: ["I'm an AI Chatbot built for an AI internship! 🤖 I use rule-based pattern matching."] },
    features: { patterns: ['what can you do','help','features'], replies: ["I can:\n• Answer questions\n• Tell jokes 😄\n• Explain AI\n• Share fun facts\n\nJust type anything!"] },
    joke: { patterns: ['joke','funny','laugh'], replies: ["Why did the robot go on a diet? 🤖 Too many bytes! 😄","Why don't scientists trust atoms? They make up everything! 😂","What do you call a fish without eyes? A fsh! 🐟😂"] },
    ai: { patterns: ['what is ai','artificial intelligence','machine learning'], replies: ["AI is simulation of human intelligence by machines! 🧠\n\nIt includes:\n• Machine Learning\n• Deep Learning\n• NLP\n• Computer Vision"] },
    thanks: { patterns: ['thank','thanks','awesome','great'], replies: ["You're welcome! 😊", "Glad I could help! 🎉"] },
    bye: { patterns: ['bye','goodbye','see you'], replies: ["Goodbye! 👋 Come back anytime!", "See you later! 😊 Have a great day!"] },
    fact: { patterns: ['fact','fun fact','did you know'], replies: ["Fun fact! 🌟 The first chatbot ELIZA was created in 1966 at MIT using pattern matching — just like me!"] },
  };

  function getResponse(input) {
    const lower = input.toLowerCase();
    for (const key in responses) {
      const cat = responses[key];
      if (cat.patterns.some(p => lower.includes(p))) {
        const r = cat.replies;
        return r[Math.floor(Math.random() * r.length)];
      }
    }
    return ["Hmm, I'm not sure! 🤔 Try asking about AI, jokes, or my features!", "I don't have a response for that yet! 😅 Ask me something else."][Math.floor(Math.random()*2)];
  }

  function addMessage(text, type) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = `<div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';
    const area = document.getElementById('chatArea');
    const t = document.createElement('div');
    t.id = 'typing'; t.className = 'message bot';
    t.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    area.appendChild(t); area.scrollTop = area.scrollHeight;
    setTimeout(() => { t.remove(); addMessage(getResponse(text), 'bot'); }, 900);
  }

  function sendQuick(text) { document.getElementById('userInput').value = text; sendMessage(); }

  window.onload = () => setTimeout(() => addMessage("Hello! 👋 I'm your AI Assistant. Ask me about AI, request a joke, or just say hi!", 'bot'), 400);
</script>
</body>
</html>
